name: dnd_manager

services:
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - dnd_net

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "mysql://dnd_manager:dnd_manager@database:3306/dnd_manager?serverVersion=8.0.32&charset=utf8mb4"
    depends_on:
      - database  
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/health/db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "8000:8000"
    networks:
      - dnd_net

  database:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dnd_manager
      MYSQL_USER: dnd_manager
      MYSQL_PASSWORD: dnd_manager
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dnd_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: database       
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - database 
    networks:
      - dnd_net

  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - dnd_net

networks:
  dnd_net:

volumes:
  db_data: