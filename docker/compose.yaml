name: restaurante_manager

services:
  frontend:
    build:
      context: ./frontend
    container_name: restaurante_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      database:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - restaurante_net

  backend:
    build:
      context: ./backend
    container_name: restaurante_backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: "mysql://manager:manager_clave@database:3306/restaurante_manager?serverVersion=mariadb-10.4.32&charset=utf8mb4"
      APP_ENV: dev
      APP_SECRET: some_secret_key
    depends_on:
      database:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "composer install --no-interaction && php -S 0.0.0.0:8000 -t public public/index.php",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - restaurante_net

  database:
    image: mariadb:10.4
    container_name: restaurante_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: manager_clave
      MYSQL_DATABASE: restaurante_manager
      MYSQL_USER: manager
      MYSQL_PASSWORD: manager_clave
    ports:
      - "3306:3306"
    volumes:
      # Mapping your SQL code to the auto-import folder
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--password=manager_clave", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - restaurante_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: restaurante_pma
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: manager_clave
    ports:
      - "8080:80"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - restaurante_net

  nginx_proxy:
    build:
      context: ./docker
    container_name: restaurante_proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - restaurante_net

networks:
  restaurante_net:
    driver: bridge

volumes:
  db_data: