security:
    password_hashers:
        # Use the interface rather than the concrete class for better abstraction
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # used to reload user from session & other features (e.g. switch_user)

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # Since we are using React, we want to handle login via JSON
            json_login:
                check_path: api_login # Matches the route name in AuthController
                username_path: email
                password_path: password

            logout:
                path: api_logout # Matches the route name in AuthController
                # Optional: where to redirect after logout (usually a 204 or success JSON)
                target: api_health

            # Ensure session-based auth is enabled (Cookie-based)
            stateless: false
            custom_authenticators:
                - App\Security\SecurityAuthenticator

    access_control:
      # PUBLIC_ACCESS for entry points
      - { path: ^/api/register, roles: PUBLIC_ACCESS }
      - { path: ^/api/login, roles: PUBLIC_ACCESS }
      - { path: ^/api/health, roles: PUBLIC_ACCESS }
      # Everything else under /api requires a logged-in user
      - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
